<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Calendário — Chai Menachem</title>
<link rel="icon" type="image/png" href="logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0A0705;color:#E8DFD0;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100%}

/* TOPBAR VOLTAR */
.topbar{display:flex;align-items:center;padding:1rem 2rem;border-bottom:1px solid rgba(255,255,255,.07);background:#0A0705}
.topbar-back{display:inline-flex;align-items:center;gap:.6rem;text-decoration:none;color:rgba(201,168,76,.7);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;transition:color .2s}
.topbar-back:hover{color:#C4975A}
.topbar-brand{margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:rgba(232,223,208,.4);letter-spacing:.12em}

.page{max-width:1000px;margin:0 auto;padding:4rem 2rem 5rem}

/* HEADER */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;gap:1rem}
.cal-month-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:300;color:#E8DFD0;text-align:center;flex:1}
.cal-month-title em{font-style:italic;color:#C4975A}
.nav-btn{width:44px;height:44px;border:1px solid rgba(201,168,76,.3);background:transparent;color:#C4975A;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s,color .3s}
.nav-btn:hover{background:#C4975A;color:#0A0705}

/* DIAS DA SEMANA */
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-weekday{text-align:center;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,168,76,.55);padding:.6rem 0}
.cal-weekday.shabat{color:rgba(201,168,76,.9)}

/* GRID */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

/* CÉLULA */
.cal-day{min-height:90px;padding:.5rem .6rem;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.015);display:flex;flex-direction:column;gap:.3rem;transition:border-color .2s,background .2s;cursor:default}
.cal-day:hover{border-color:rgba(201,168,76,.2);background:rgba(201,168,76,.03)}
.cal-day.empty{background:transparent;border-color:transparent}
.cal-day.today{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.06)}
.cal-day.shabat-day{background:rgba(201,168,76,.04);border-color:rgba(201,168,76,.12)}

.day-num{font-size:.8rem;font-weight:500;color:rgba(232,223,208,.4);line-height:1;margin-bottom:.1rem}
.cal-day.today .day-num{color:#C4975A;font-weight:700}
.cal-day.shabat-day .day-num{color:rgba(201,168,76,.7)}

/* EVENTO */
.evento{font-size:.62rem;line-height:1.3;padding:.2rem .4rem;border-radius:2px;color:#0A0705;font-weight:500;letter-spacing:.02em;cursor:default;user-select:none}
.cal-day.tem-fotos{cursor:pointer}
.cal-day.tem-fotos:hover{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.07)}
.foto-hint{font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(201,168,76,.55);margin-top:auto;padding-top:.3rem}
.evento-shabat{background:rgba(201,168,76,.75);color:#2a1a00}
.evento-programa{background:#7A3A3A;color:#f5e0d8}
.evento-aula{background:rgba(61,99,88,.85);color:#c8e8e0}
.evento-especial{background:#52376B;color:#e8d8f8}

/* LEGENDA */
.legenda{display:flex;flex-wrap:wrap;gap:1rem;margin-top:2rem;justify-content:center}
.leg-item{display:flex;align-items:center;gap:.5rem;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(232,223,208,.45)}
.leg-dot{width:10px;height:10px;border-radius:1px;flex-shrink:0}

/* ── LIGHTBOX ── */
.lb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:2000;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;padding:1.5rem}
.lb-overlay.open{display:flex}

.lb-close{position:absolute;top:1.2rem;right:1.2rem;width:44px;height:44px;background:transparent;border:1px solid rgba(201,168,76,.35);color:#C4975A;font-size:1.4rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s}
.lb-close:hover{background:#C4975A;color:#0A0705}

.lb-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;color:#C4975A;letter-spacing:.08em;text-align:center;max-width:80vw}

.lb-row{display:flex;align-items:center;gap:1rem}
.lb-nav{width:44px;height:44px;background:transparent;border:1px solid rgba(201,168,76,.35);color:#C4975A;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,color .2s}
.lb-nav:hover{background:#C4975A;color:#0A0705}
.lb-nav:disabled{opacity:.2;cursor:default;pointer-events:none}

.lb-img-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.lb-img{max-width:82vw;max-height:66vh;object-fit:contain;border:1px solid rgba(201,168,76,.15);display:block}

.lb-counter{font-size:.62rem;letter-spacing:.18em;color:rgba(201,168,76,.45);text-align:center}

/* Thumbnail strip */
.lb-thumbs{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;max-width:88vw}
.lb-thumb{width:52px;height:52px;object-fit:cover;border:1px solid rgba(201,168,76,.2);cursor:pointer;opacity:.5;transition:opacity .2s,border-color .2s;flex-shrink:0}
.lb-thumb.active{opacity:1;border-color:#C4975A}

@media(max-width:640px){
  .cal-day{min-height:65px;padding:.3rem .4rem}
  .evento{font-size:.55rem}
  .lb-img{max-width:95vw;max-height:55vh}
  .lb-thumb{width:40px;height:40px}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Página Principal
  </a>
  <span class="topbar-brand">Chai Menachem</span>
</div>

<div class="page">

  <div class="cal-header">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <div class="cal-month-title" id="monthTitle"></div>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>

  <div class="cal-weekdays">
    <div class="cal-weekday">Dom</div>
    <div class="cal-weekday">Seg</div>
    <div class="cal-weekday">Ter</div>
    <div class="cal-weekday">Qua</div>
    <div class="cal-weekday">Qui</div>
    <div class="cal-weekday">Sex</div>
    <div class="cal-weekday shabat">Shabat</div>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <div class="legenda">
    <div class="leg-item"><div class="leg-dot evento-shabat"></div>Shabat</div>
    <div class="leg-item"><div class="leg-dot evento-programa"></div>Programas</div>
    <div class="leg-item"><div class="leg-dot evento-aula"></div>Aulas</div>
    <div class="leg-item"><div class="leg-dot evento-especial"></div>Especial</div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lbOverlay">
  <button class="lb-close" id="lbClose">&#10005;</button>
  <div class="lb-title" id="lbTitle"></div>
  <div class="lb-row">
    <button class="lb-nav" id="lbPrev">&#8592;</button>
    <div class="lb-img-wrap">
      <img class="lb-img" id="lbImg" src="" alt=""/>
    </div>
    <button class="lb-nav" id="lbNext">&#8594;</button>
  </div>
  <div class="lb-counter" id="lbCounter"></div>
  <div class="lb-thumbs" id="lbThumbs"></div>
</div>

<script>
/* ══════════════════════════════════════════════════
   EVENTOS — ATUALIZE AQUI A CADA MÊS
   Formato: "AAAA-MM-DD": [ {texto, tipo, fotos?} ]
   Tipos: "shabat" | "programa" | "aula" | "especial"
   fotos: array de caminhos de imagem (opcional)
   Exemplo com fotos:
     "2026-05-04": [{ texto: "Lag Ba'Omer", tipo: "especial",
                      fotos: ["fotos/lag-baomer-1.jpg","fotos/lag-baomer-2.jpg"] }]
══════════════════════════════════════════════════ */
const EVENTOS = {

  /* ── MAIO 2026 ── */
  "2026-05-01": [{ texto: "Pessach Sheni · Sopa após Kabalat Shabat", tipo: "especial" }],
  "2026-05-04": [{ texto: "Lag Ba'Omer · Hamburgada", tipo: "especial",
    fotos: [
      "WhatsApp Image 2026-05-06 at 12.55.51.jpeg",
      "WhatsApp Image 2026-05-06 at 12.55.51 (1).jpeg",
      "WhatsApp Image 2026-05-06 at 12.55.51 (2).jpeg",
      "WhatsApp Image 2026-05-06 at 12.55.52.jpeg",
      "WhatsApp Image 2026-05-19 at 10.11.39.jpeg",
      "WhatsApp Image 2026-05-19 at 10.11.40.jpeg",
      "WhatsApp Image 2026-05-19 at 10.11.42.jpeg",
      "WhatsApp Image 2026-05-19 at 10.11.44.jpeg",
      "WhatsApp Image 2026-05-19 at 10.11.44 (1).jpeg",
      "WhatsApp Image 2026-05-06 at 12.56.58.jpeg",
      "WhatsApp Image 2026-05-06 at 12.57.01.jpeg",
      "WhatsApp Image 2026-05-06 at 12.57.02.jpeg",
      "WhatsApp Image 2026-05-06 at 12.57.06.jpeg"
    ]
  }],
  "2026-05-12": [{ texto: "Voz de Rachel", tipo: "especial",
    fotos: [
      "Instagram_files/694552585_18010268084890394_3078902986470295830_n.jpg",
      "Instagram_files/697021558_18010268141890394_6867569064967942837_n.jpg",
      "Instagram_files/670372408_18006683495890394_432621231109026145_n.jpg",
      "Instagram_files/651675958_18003167012890394_4892856171326194990_n.jpg",
      "WhatsApp Image 2026-05-12 at 21.18.48.jpeg",
      "WhatsApp Image 2026-05-12 at 21.18.49.jpeg",
      "WhatsApp Image 2026-05-12 at 21.18.50.jpeg",
      "WhatsApp Image 2026-05-12 at 21.18.50 (1).jpeg",
      "WhatsApp Image 2026-05-12 at 21.18.51.jpeg",
      "WhatsApp Image 2026-05-12 at 21.18.51 (1).jpeg",
      "WhatsApp Image 2026-05-12 at 21.18.52.jpeg"
    ]
  }],
  "2026-05-14": [{ texto: "Chai Teens", tipo: "programa" }],
  "2026-05-21": [{ texto: "Shavuot", tipo: "especial" }],
  "2026-05-22": [{ texto: "Shavuot", tipo: "especial" }],
  "2026-05-23": [{ texto: "Shavuot", tipo: "especial" }],
  "2026-05-31": [{ texto: "Cabalat Shabat 18h30", tipo: "shabat" }],

};

/* ══ NÃO PRECISA MEXER ABAIXO ══ */
const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
let current = new Date();
let viewYear = current.getFullYear();
let viewMonth = current.getMonth();
const today = new Date();

function pad(n){ return String(n).padStart(2,'0'); }

function render(){
  const title = document.getElementById('monthTitle');
  title.innerHTML = `<em>${meses[viewMonth]}</em> ${viewYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    const empty = document.createElement('div');
    empty.className='cal-day empty';
    grid.appendChild(empty);
  }

  for(let d=1;d<=daysInMonth;d++){
    const cell = document.createElement('div');
    const dateStr = `${viewYear}-${pad(viewMonth+1)}-${pad(d)}`;
    const dow = new Date(viewYear, viewMonth, d).getDay();
    const isShabat = dow === 6;
    const isToday = (d===today.getDate() && viewMonth===today.getMonth() && viewYear===today.getFullYear());

    let cls = 'cal-day';
    if(isShabat) cls += ' shabat-day';
    if(isToday)  cls += ' today';
    cell.className = cls;

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    const evts = EVENTOS[dateStr] || [];

    // Coleta todas as fotos do dia
    let todasFotos = [];
    let tituloDia  = '';
    evts.forEach(ev => {
      const tag = document.createElement('div');
      tag.className = `evento evento-${ev.tipo}`;
      tag.textContent = ev.texto;
      cell.appendChild(tag);
      if(ev.fotos && ev.fotos.length > 0){
        todasFotos = todasFotos.concat(ev.fotos);
        if(!tituloDia) tituloDia = ev.texto;
      }
    });

    // Se o dia tem fotos, torna a célula clicável
    if(todasFotos.length > 0){
      cell.classList.add('tem-fotos');
      const hint = document.createElement('div');
      hint.className = 'foto-hint';
      hint.textContent = '📷 fotos';
      cell.appendChild(hint);
      cell.addEventListener('click', () => abrirLightbox(tituloDia, todasFotos));
    }

    grid.appendChild(cell);
  }
}

/* ── LIGHTBOX ── */
let lbFotos = [];
let lbIdx   = 0;

function abrirLightbox(titulo, fotos){
  lbFotos = fotos;
  lbIdx   = 0;
  document.getElementById('lbTitle').textContent = titulo;
  document.getElementById('lbOverlay').classList.add('open');
  renderLb();
  document.body.style.overflow = 'hidden';
}

function fecharLightbox(){
  document.getElementById('lbOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function encodePath(p){
  // Only encode spaces — parentheses and dots are safe in URLs
  return p.replace(/ /g, '%20');
}

function renderLb(){
  const img     = document.getElementById('lbImg');
  const counter = document.getElementById('lbCounter');
  const thumbs  = document.getElementById('lbThumbs');
  const prev    = document.getElementById('lbPrev');
  const next    = document.getElementById('lbNext');

  img.src = encodePath(lbFotos[lbIdx]);
  img.alt = `Foto ${lbIdx+1}`;
  counter.textContent = `${lbIdx+1} / ${lbFotos.length}`;
  prev.disabled = (lbIdx === 0);
  next.disabled = (lbIdx === lbFotos.length - 1);

  // Miniaturas
  thumbs.innerHTML = '';
  if(lbFotos.length > 1){
    lbFotos.forEach((src, i) => {
      const th = document.createElement('img');
      th.className = 'lb-thumb' + (i === lbIdx ? ' active' : '');
      th.src = encodePath(src);
      th.addEventListener('click', () => { lbIdx = i; renderLb(); });
      thumbs.appendChild(th);
    });
  }
}

document.getElementById('lbClose').addEventListener('click', fecharLightbox);
document.getElementById('lbOverlay').addEventListener('click', e => {
  if(e.target === document.getElementById('lbOverlay')) fecharLightbox();
});
document.getElementById('lbPrev').addEventListener('click', () => {
  if(lbIdx > 0){ lbIdx--; renderLb(); }
});
document.getElementById('lbNext').addEventListener('click', () => {
  if(lbIdx < lbFotos.length-1){ lbIdx++; renderLb(); }
});

// Teclado: setas e Esc
document.addEventListener('keydown', e => {
  if(!document.getElementById('lbOverlay').classList.contains('open')) return;
  if(e.key === 'Escape') fecharLightbox();
  if(e.key === 'ArrowLeft'  && lbIdx > 0){ lbIdx--; renderLb(); }
  if(e.key === 'ArrowRight' && lbIdx < lbFotos.length-1){ lbIdx++; renderLb(); }
});

document.getElementById('prevBtn').onclick = () => {
  viewMonth--;
  if(viewMonth<0){ viewMonth=11; viewYear--; }
  render();
};
document.getElementById('nextBtn').onclick = () => {
  viewMonth++;
  if(viewMonth>11){ viewMonth=0; viewYear++; }
  render();
};

render();
</script>
</body>
</html>
