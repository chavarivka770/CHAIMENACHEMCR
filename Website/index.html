<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chai Menachem — Centro Chabad</title>
<link rel="icon" type="image/png" href="logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Frank+Ruhl+Libre:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}

:root {
  --accent: #7A3A3A;
  --accent-light: #9A4A4A;
  --accent-glow: rgba(122,58,58,0.45);
}

/* ── LANDING PAGE ── */
#landing {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
}

/* ── SLIDESHOW ── */
.slides {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.slide {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 2s ease-in-out;
  animation: kenburns 10s ease-in-out infinite alternate;
}
.slide.active { opacity: 1; }
@keyframes kenburns {
  0%   { transform: scale(1.0); }
  100% { transform: scale(1.08); }
}
.overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  background:
    radial-gradient(ellipse 62% 72% at 50% 44%,
      rgba(3,2,1,0.92) 0%,
      rgba(3,2,1,0.72) 40%,
      rgba(3,2,1,0.18) 100%),
    linear-gradient(to bottom, rgba(3,2,1,0.72) 0%, rgba(3,2,1,0.12) 24%, rgba(3,2,1,0.12) 70%, rgba(3,2,1,0.82) 100%);
}

/* ── CONTENU ── */
.landing-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 2.5rem 3rem 1.5rem;
}

/* ── CENTER GROUP ── */
.center-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: .8rem;
}
.center-pair {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
}

/* LOGO */
.logo-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  animation: fadeSlideLeft .8s ease both;
  animation-delay: .2s;
  position: relative;
}
@keyframes fadeSlideLeft {
  from { opacity: 0; transform: translateX(-28px); }
  to   { opacity: 1; transform: translateX(0); }
}
.logo-img-wrap {
  width: 260px;
  height: 172px;
  overflow: hidden;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
.logo-img {
  position: absolute;
  width: 429px;
  left: -88px;
  top: -136px;
  filter: url(#gold-exact);
  -webkit-mask-image: linear-gradient(to right, black 76%, transparent 100%);
  mask-image: linear-gradient(to right, black 76%, transparent 100%);
  -webkit-mask-size: 0% 100%;
  mask-size: 0% 100%;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  animation: logoWrite 2.4s cubic-bezier(.25,.46,.45,.94) .3s both;
}
@keyframes logoWrite {
  from { -webkit-mask-size: 0% 100%;   mask-size: 0% 100%; }
  to   { -webkit-mask-size: 132% 100%; mask-size: 132% 100%; }
}
/* Lueur ambiante logo */
.logo-area::before {
  content: '';
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 320px; height: 145px;
  background: radial-gradient(ellipse at center,
    rgba(196,151,90,0.42) 0%,
    rgba(196,151,90,0.14) 52%,
    transparent 80%);
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  animation: logoAmbient 6s ease-in-out 2.2s infinite;
}
@keyframes logoAmbient {
  0%,100% { opacity: .32; }
  50%     { opacity: .82; }
}

/* Slogan */
.center-bottom-label {
  text-align: center;
  margin-top: 0;
  margin-bottom: 0;
  opacity: 0;
  animation: fadeIn .8s ease 1.6s both;
}
.slogan-text {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.5rem, 2.6vw, 2.2rem);
  font-style: italic;
  font-weight: 300;
  color: rgba(255,255,255,.55);
  letter-spacing: .04em;
  margin-bottom: .35rem;
}
.location-text {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: .55rem;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: rgba(255,255,255,.25);
}

/* Separador vertical animado */
.pair-divider {
  width: 1px;
  height: 0;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,.35), transparent);
  flex-shrink: 0;
  animation: dividerGrow .7s cubic-bezier(.25,.46,.45,.94) .65s both;
}
@keyframes dividerGrow {
  to { height: 160px; }
}

/* BEM-VINDOS */
.welcome-area {
  text-align: left;
  position: relative;
  padding: 1.2rem 1.5rem;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes clipReveal {
  from { clip-path: inset(100% 0 0 0); opacity: 0; }
  to   { clip-path: inset(0% 0 0 0);   opacity: 1; }
}
.welcome-eyebrow {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: .48rem;
  font-weight: 300;
  letter-spacing: .58em;
  text-transform: uppercase;
  color: rgba(196,151,90,.38);
  margin-bottom: 1rem;
  opacity: 0;
  animation: fadeIn .8s ease 1.5s both;
}
.welcome-word {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4.8rem, 8.8vw, 8.5rem);
  font-weight: 300;
  font-style: italic;
  color: #C4975A;
  letter-spacing: -.02em;
  line-height: 1;
  white-space: nowrap;
  display: block;
  animation: clipReveal 1.05s cubic-bezier(.25,.46,.45,.94) .75s both;
}
.welcome-city {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: .48rem;
  font-weight: 300;
  letter-spacing: .32em;
  text-transform: uppercase;
  color: rgba(255,255,255,.2);
  margin-top: .9rem;
  opacity: 0;
  animation: fadeIn .8s ease 2.2s both;
}
.welcome-sub-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.3rem, 2.4vw, 2rem);
  font-style: normal;
  font-weight: 300;
  color: rgba(255,255,255,.45);
  display: block;
  margin-top: .55rem;
  letter-spacing: .04em;
  opacity: 0;
  animation: fadeIn .8s ease 1.25s both;
}
/* Traço animado */
.bv-underline {
  display: block;
  height: 1px;
  width: 0;
  background: linear-gradient(90deg, #C4975A, var(--accent), transparent);
  margin-top: .6rem;
  transform-origin: left;
  animation: underlineGrow .9s cubic-bezier(.25,.46,.45,.94) 1.5s forwards,
             underlinePulse 3s ease-in-out 2.5s infinite;
}
@keyframes underlineGrow { to { width: 100%; } }
@keyframes underlinePulse {
  0%,100% { opacity:1; }
  50%      { opacity:.35; }
}
.welcome-area:hover .bv-underline {
  height: 2px;
  background: linear-gradient(90deg, #C4975A, var(--accent));
}

/* ── MENU BUTTONS ── */
.menu-section { margin: 1rem 0; }
.menu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .6rem;
  max-width: 620px;
  margin: 0 auto;
}
.menu-btn {
  position: relative;
  overflow: hidden;
  padding: .85rem 1rem;
  background: rgba(10,6,3,.45);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.28);
  color: rgba(255,255,255,.95);
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem;
  font-weight: 400;
  letter-spacing: .14em;
  text-transform: uppercase;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  transition: border-color .3s, color .3s, background .3s;
  opacity: 0;
  transform: translateY(18px);
  animation: btnUp .5s ease both;
}
.menu-btn::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0;
  background: var(--accent);
  transition: height .35s cubic-bezier(.25,.46,.45,.94);
  z-index: 0;
}
.menu-btn span { position: relative; z-index: 1; }
.menu-btn:hover { border-color: var(--accent); color: #fff; }
.menu-btn:hover::before { height: 100%; }
@keyframes btnUp { to { opacity: 1; transform: translateY(0); } }
.menu-btn:nth-child(1) { animation-delay: .9s; }
.menu-btn:nth-child(2) { animation-delay: 1.0s; }
.menu-btn:nth-child(3) { animation-delay: 1.1s; }
.menu-btn:nth-child(4) { animation-delay: 1.15s; }
.menu-btn:nth-child(5) { animation-delay: 1.2s; }
.menu-btn:nth-child(6) { animation-delay: 1.25s; }

/* ── BOTTOM ROW ── */
.bottom-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .8rem;
  padding-bottom: .5rem;
}
.fale-btn {
  display: flex;
  align-items: center;
  gap: .7rem;
  padding: .85rem 2.2rem;
  background: #25D366;
  border: none;
  text-decoration: none;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  cursor: pointer;
  animation: fadeIn .8s ease 1.5s both, pulse 3s ease 4s infinite;
  transition: background .3s, transform .2s;
}
.fale-btn:hover { background: #1EB857; transform: translateY(-2px); }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(37,211,102,.4); }
  50%      { box-shadow: 0 0 0 10px rgba(37,211,102,0); }
}
.insta-btn {
  display: inline-flex;
  align-items: center;
  gap: .65rem;
  padding: .85rem 1.8rem;
  background: linear-gradient(135deg, #833AB4, #C13584, #E1306C);
  border: none;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: opacity .3s, transform .2s;
  animation: fadeIn .8s ease 1.6s both;
}
.insta-btn:hover { opacity: .85; transform: translateY(-2px); }

/* ── DOTS SLIDESHOW ── */
.slide-dots {
  position: absolute;
  bottom: 1rem; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: .5rem;
  z-index: 10;
}
.slide-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,.3);
  transition: background .3s;
  cursor: pointer;
}
.slide-dot.active { background: #C4975A; }
</style>
</head>
<body>

<script>
/* SLIDESHOW */
(function() {
  const slides = document.querySelectorAll('.slide');
  const dots   = document.querySelectorAll('.slide-dot');
  let cur = 0;
  function goTo(n) {
    slides[cur].classList.remove('active'); dots[cur].classList.remove('active');
    cur = (n + slides.length) % slides.length;
    slides[cur].classList.add('active'); dots[cur].classList.add('active');
  }
  dots.forEach((d, i) => d.addEventListener('click', () => goTo(i)));
  setInterval(() => goTo(cur + 1), 5000);
})();
</script>
